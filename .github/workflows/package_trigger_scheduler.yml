name: Package Trigger Scheduler

on:
  schedule:
    - cron: '12 1 * * 3'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-trigger-scheduler
  cancel-in-progress: false

jobs:
  package-trigger-scheduler:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package Trigger Scheduler
        shell: bash
        env:
          SKIP_PACKAGE_TRIGGER: ${{ vars.SKIP_PACKAGE_TRIGGER }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          set -euo pipefail

          triggered_branches=""
          skipped_branches=""

          printf "# Package trigger scheduler for docker-lidarr\n\n" >> "$GITHUB_STEP_SUMMARY"

          printf "Found the branches:\n\n%s\n" \
            "$(git for-each-ref --format='- %(refname:lstrip=3)' refs/remotes)" \
            >> "$GITHUB_STEP_SUMMARY"

          git for-each-ref --format='%(refname:lstrip=3)' refs/remotes | \
          while IFS= read -r br; do

            [[ -z "$br" ]] && continue

            if [[ "$br" == "HEAD" ]]; then
              printf "\nSkipping %s.\n" "$br" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            printf "\n## Evaluating `%s`\n\n" "$br" >> "$GITHUB_STEP_SUMMARY"

            JENKINS_VARS=$(curl --fail --silent --show-error --location \
              "https://raw.githubusercontent.com/linuxserver/docker-lidarr/${br}/jenkins-vars.yml" || true)

            if [[ -z "$JENKINS_VARS" ]]; then
              echo "Missing jenkins-vars.yml -> skip $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            if ! curl --fail --silent --show-error --location \
              "https://raw.githubusercontent.com/linuxserver/docker-lidarr/${br}/Jenkinsfile" \
              >/dev/null 2>&1; then

              echo "> No Jenkinsfile -> skipping $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            ls_branch=$(echo "$JENKINS_VARS" | yq -r '.ls_branch // empty')
            skip_check=$(echo "$JENKINS_VARS" | yq -r '.skip_package_check // false')

            if [[ "$br" != "$ls_branch" ]]; then
              echo "Dev branch -> skip $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            if [[ "$skip_check" == "true" ]]; then
              echo "skip_package_check enabled -> skip $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            if grep -q "^lidarr_${br}" <<< "${SKIP_PACKAGE_TRIGGER:-}"; then
              echo "Org skip variable -> skip $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            if [[ "$(curl --fail --silent --show-error \
              "https://ci.linuxserver.io/job/Docker-Pipeline-Builders/job/docker-lidarr/job/${br}/lastBuild/api/json" \
              | jq -r '.building // false')" == "true" ]]; then

              echo "Jenkins already building -> skip $br" >> "$GITHUB_STEP_SUMMARY"
              skipped_branches+="$br "
              continue
            fi

            echo "Triggering build for $br" >> "$GITHUB_STEP_SUMMARY"
            triggered_branches+="$br "

            response=$(curl --fail --silent --show-error --location -iX POST \
              "https://ci.linuxserver.io/job/Docker-Pipeline-Builders/job/docker-lidarr/job/${br}/buildWithParameters?PACKAGE_CHECK=true" \
              --user "$JENKINS_USER:$JENKINS_TOKEN" \
              | grep -i location \
              | sed 's|^[Ll]ocation: ||' || true)

            if [[ -n "$response" ]]; then
              sleep 10

              buildurl=$(curl --silent --show-error --location \
                "${response}api/json" | jq -r '.executable.url // empty')

              if [[ -n "$buildurl" ]]; then
                curl --fail --silent --show-error --location \
                  -X POST \
                  --user "$JENKINS_USER:$JENKINS_TOKEN" \
                  "${buildurl}submitDescription" \
                  --data-urlencode "description=GHA package trigger" \
                  --data-urlencode "Submit=Submit"
              fi
            fi

          done

          if [[ -n "${triggered_branches}" || -n "${skipped_branches}" ]]; then
            curl --fail --silent --show-error --location \
              -X POST \
              -H "Content-Type: application/json" \
              --data "{\"embeds\": [{\"color\": 9802903, \"description\": \"**Package Trigger**\nTriggered: ${triggered_branches}\nSkipped: ${skipped_branches}\"}]}" \
              "$DISCORD_WEBHOOK"
          fi