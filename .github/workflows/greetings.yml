name: Greetings

on:
  issues:
    types: [opened]

  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  greeting:
    permissions:
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: >
            Thanks for opening your first issue.

          pr-message: >
            Thanks for opening your first pull request.