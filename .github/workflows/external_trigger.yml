name: External Trigger Main

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-trigger-master
  cancel-in-progress: false

jobs:
  external-trigger-master:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: External Trigger
        if: github.ref == 'refs/heads/master'
        shell: bash

        env:
          SKIP_EXTERNAL_TRIGGER: ${{ vars.SKIP_EXTERNAL_TRIGGER }}

        run: |
          set -euo pipefail

          printf "# External trigger for docker-lidarr\n\n" >> "$GITHUB_STEP_SUMMARY"

          SKIP_EXTERNAL_TRIGGER="${SKIP_EXTERNAL_TRIGGER:-}"

          # -------------------------
          # CASE 1: skip specific version prefix
          # -------------------------
          if grep -q "^lidarr_master_" <<< "${SKIP_EXTERNAL_TRIGGER}"; then

            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> SKIP_EXTERNAL_TRIGGER contains version filter (lidarr_master_*)" >> "$GITHUB_STEP_SUMMARY"
            echo "> Will skip trigger only if version matches." >> "$GITHUB_STEP_SUMMARY"

          # -------------------------
          # CASE 2: hard skip all master triggers
          # -------------------------
          elif grep -q "^lidarr_master" <<< "${SKIP_EXTERNAL_TRIGGER}"; then

            echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
            echo "> SKIP_EXTERNAL_TRIGGER contains lidarr_master → skipping all triggers." >> "$GITHUB_STEP_SUMMARY"
            exit 0

          # -------------------------
          # CASE 3: no skip rules
          # -------------------------
          else

            echo "> [!NOTE]" >> "$GITHUB_STEP_SUMMARY"
            echo "> No skip rules found. External trigger allowed." >> "$GITHUB_STEP_SUMMARY"

          fi